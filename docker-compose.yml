version: '3.8'

services:
  # 1. 데이터베이스 서비스
  postgres-db:
    image: postgres:15-alpine
    container_name: wms-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - ./db_data:/var/lib/postgresql/data

  # 2. 백엔드 서비스
  backend:
    build:
      context: .
      dockerfile: wms-inventory/Dockerfile
    container_name: wms-backend
    ports:
      - "8081:8081"
    environment:
      # 여기가 핵심입니다! 컨테이너 이름(wms-postgres)으로 맞춰주세요.
      - SPRING_DATASOURCE_URL=jdbc:postgresql://wms-postgres:5432/wms_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - postgres-db
    # 컨테이너끼리 서로 찾으려면 networks 설정이 필요할 수 있습니다.
    # 지금은 기본 default 네트워크를 사용 중일 텐데, 잘 안되면 아래를 추가하세요.