name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. 백엔드(Java/Gradle) 빌드
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Backend with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew :wms-inventory:clean :wms-inventory:build
          cp wms-inventory/build/libs/*.jar wms-inventory/app.jar

      # 2. Docker 이미지 빌드 및 푸시
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./wms-inventory
          file: ./wms-inventory/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/wms-inventory:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./wms-frontend
          file: ./wms-frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/wms-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            cd /home/ubuntu/wms-inventory
            docker compose pull
            docker compose up -d
            docker image prune -f