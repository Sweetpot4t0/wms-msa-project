name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Backend
        run: |
          chmod +x ./gradlew
          ./gradlew :wms-inventory:clean :wms-inventory:build
          # 1. 빌드된 파일이 있는지 확인 (에러 발생 시 로그에 표시됨)
          ls -l wms-inventory/build/libs/
          # 2. 확실하게 파일이 있는 경로에서 복사
          # 기존 app.jar 제거
          rm -f wms-inventory/app.jar
          # 3. libs 폴더 안의 모든 jar 파일을 wms-inventory 루트로 복사
          cp wms-inventory/build/libs/*.jar wms-inventory/app.jar

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd wms-frontend
          npm install
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./wms-inventory
          file: ./wms-inventory/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/wms-inventory:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./wms-frontend
          file: ./wms-frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/wms-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            cd /home/ubuntu/wms-inventory
            docker-compose pull
            docker-compose up -d
            docker image prune -f